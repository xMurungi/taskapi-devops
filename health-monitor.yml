# =============================================================================
# health-monitor.yml
# Scheduled pipeline — runs every 5 minutes during business hours EAT
# (Mon-Fri 05:00-15:00 UTC = 08:00-18:00 EAT)
#
# What it checks per namespace:
#   - CrashLoopBackOff pods
#   - OOMKilled pods
#   - ImagePullBackOff pods
#   - Pending pods
#   - Deployments with 0 ready replicas (when desired > 0)
#
# On issues found: sends Teams alert via Power Automate Workflows webhook
#
# Required pipeline variables (set in Azure DevOps → Library → cluster-failover-vars):
#   TEAMS_WEBHOOK_URL   — Power Automate Workflows webhook URL
#
# NOTE: No KUBECONFIG_CONTENT needed when running on self-hosted in-cluster agent.
#       kubectl uses the pod's ServiceAccount token automatically (in-cluster auth).
# =============================================================================

trigger: none

schedules:
  - cron: "*/5 5-15 * * 1-5"   # Every 5 min, 08:00-18:00 EAT (UTC+3), Mon-Fri
    displayName: "Business hours health check (EAT)"
    branches:
      include:
        - main
    always: true                 # Run even if no repo changes

pool:
  vmImage: ubuntu-latest          # Switch to: name: k8s-cluster-pool  once agent is deployed

variables:
  - group: cluster-failover-vars

jobs:
  - job: healthCheck
    displayName: "Cluster Health Check"
    timeoutInMinutes: 8           # Fail fast if kubectl hangs
    steps:

      - task: CmdLine@2
        displayName: "Install kubectl"
        inputs:
          script: |
            curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl && sudo mv kubectl /usr/local/bin/kubectl
            kubectl version --client
            
      - task: CmdLine@2
        displayName: "Run health checks"
        inputs:
          script: |
            #!/usr/bin/env bash
            set -euo pipefail

            TEAMS_WEBHOOK="$TEAMS_WEBHOOK_URL"
            ISSUES_FOUND=false
            NAMESPACES_CHECKED=0
            NAMESPACES_FAILED=0

            # ── Helper: send Adaptive Card to Teams Workflows webhook ─────────
            send_teams_alert() {
              local title="$1"
              local subtitle="$2"
              local body_text="$3"
              local color="$4"        # "attention" | "good" | "accent"
              local footer_text="${5:-}"

              local body_escaped
              body_escaped=$(printf '%s' "$body_text" | \
                python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")

              local footer_block=""
              if [[ -n "$footer_text" ]]; then
                local footer_escaped
                footer_escaped=$(printf '%s' "$footer_text" | \
                  python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
                footer_block=",{
                  \"type\": \"TextBlock\",
                  \"text\": $footer_escaped,
                  \"wrap\": true,
                  \"spacing\": \"Medium\",
                  \"color\": \"Accent\"
                }"
              fi

              curl -s -X POST "$TEAMS_WEBHOOK" \
                -H "Content-Type: application/json" \
                -d "{
                  \"type\": \"message\",
                  \"attachments\": [
                    {
                      \"contentType\": \"application/vnd.microsoft.card.adaptive\",
                      \"content\": {
                        \"\$schema\": \"http://adaptivecards.io/schemas/adaptive-card.json\",
                        \"type\": \"AdaptiveCard\",
                        \"version\": \"1.4\",
                        \"body\": [
                          {
                            \"type\": \"TextBlock\",
                            \"text\": \"$title\",
                            \"weight\": \"Bolder\",
                            \"size\": \"Large\",
                            \"color\": \"$color\",
                            \"wrap\": true
                          },
                          {
                            \"type\": \"TextBlock\",
                            \"text\": \"$subtitle\",
                            \"isSubtle\": true,
                            \"wrap\": true,
                            \"spacing\": \"None\"
                          },
                          {
                            \"type\": \"TextBlock\",
                            \"text\": $body_escaped,
                            \"wrap\": true,
                            \"spacing\": \"Medium\"
                          }
                          $footer_block
                        ]
                      }
                    }
                  ]
                }" || echo "WARNING: Could not send Teams alert"
            }

            # ── Get all namespaces dynamically ────────────────────────────────
            echo "Fetching namespaces..."
            mapfile -t NAMESPACES < <(
              kubectl get namespaces \
                -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' \
                --request-timeout=15s 2>/dev/null || true
            )

            if [[ ${#NAMESPACES[@]} -eq 0 ]]; then
              echo "ERROR: Could not fetch namespaces"
              send_teams_alert \
                "🚨 Health Check Failed" \
                "$(date -u '+%Y-%m-%d %H:%M UTC')" \
                "Could not connect to cluster to fetch namespaces. Manual investigation required." \
                "attention" \
                ""
              exit 1
            fi

            echo "Found ${#NAMESPACES[@]} namespaces"

            # System namespaces to skip — not application workloads
            SKIP_NS=(
              "kube-system" "kube-public" "kube-node-lease"
              "flux-system" "istio-system" "azuremonitor-containers"
              "azure-arc" "default" "azdo-agent"
            )

            # ── Check each namespace ──────────────────────────────────────────
            NS_ISSUES=""

            for ns in "${NAMESPACES[@]}"; do
              skip=false
              for s in "${SKIP_NS[@]}"; do
                [[ "$ns" == "$s" ]] && skip=true && break
              done
              [[ "$skip" == true ]] && continue

              ((NAMESPACES_CHECKED++)) || true
              ns_issues=""

              # Single kubectl call — get all pod state needed for checks
              pod_data=$(kubectl get pods -n "$ns" \
                --no-headers \
                --request-timeout=10s \
                -o custom-columns=\
            "NAME:.metadata.name,\
            STATUS:.status.phase,\
            READY:.status.containerStatuses[0].ready,\
            RESTARTS:.status.containerStatuses[0].restartCount,\
            REASON:.status.containerStatuses[0].state.waiting.reason,\
            START:.metadata.creationTimestamp" \
                2>/dev/null || echo "ERROR")

              if [[ "$pod_data" == "ERROR" || -z "$pod_data" ]]; then
                ns_issues+="⚠️ Could not fetch pod data\n"
                ((NAMESPACES_FAILED++)) || true
              else
                # CrashLoopBackOff
                crash_pods=$(echo "$pod_data" | grep "CrashLoopBackOff" \
                  | awk '{print $1}' || true)
                if [[ -n "$crash_pods" ]]; then
                  count=$(echo "$crash_pods" | wc -l | tr -d ' ')
                  ns_issues+="🔴 CrashLoopBackOff: $count pod(s)\n"
                  while IFS= read -r pod; do
                    ns_issues+="  - $pod\n"
                  done <<< "$crash_pods"
                fi

                # OOMKilled — requires separate call for lastState
                oom_pods=$(kubectl get pods -n "$ns" --no-headers \
                  -o custom-columns="NAME:.metadata.name,REASON:.status.containerStatuses[0].lastState.terminated.reason" \
                  --request-timeout=10s 2>/dev/null \
                  | grep "OOMKilled" | awk '{print $1}' || true)
                if [[ -n "$oom_pods" ]]; then
                  count=$(echo "$oom_pods" | wc -l | tr -d ' ')
                  ns_issues+="🔴 OOMKilled: $count pod(s)\n"
                  while IFS= read -r pod; do
                    ns_issues+="  - $pod\n"
                  done <<< "$oom_pods"
                fi

                # ImagePullBackOff / ErrImagePull
                imgpull_pods=$(echo "$pod_data" | \
                  grep -E "ImagePullBackOff|ErrImagePull" \
                  | awk '{print $1}' || true)
                if [[ -n "$imgpull_pods" ]]; then
                  count=$(echo "$imgpull_pods" | wc -l | tr -d ' ')
                  ns_issues+="🟡 ImagePullBackOff: $count pod(s)\n"
                  while IFS= read -r pod; do
                    ns_issues+="  - $pod\n"
                  done <<< "$imgpull_pods"
                fi

                # Pending pods
                pending_pods=$(echo "$pod_data" | grep "Pending" \
                  | awk '{print $1}' || true)
                if [[ -n "$pending_pods" ]]; then
                  count=$(echo "$pending_pods" | wc -l | tr -d ' ')
                  ns_issues+="🟡 Pending: $count pod(s)\n"
                  while IFS= read -r pod; do
                    ns_issues+="  - $pod\n"
                  done <<< "$pending_pods"
                fi
              fi

              # Deployments with 0 ready but desired > 0
              # Skips intentionally scaled-down deployments (desired == 0)
              deploy_data=$(kubectl get deployments -n "$ns" \
                --no-headers \
                --request-timeout=10s \
                -o custom-columns=\
            "NAME:.metadata.name,\
            DESIRED:.spec.replicas,\
            READY:.status.readyReplicas" \
                2>/dev/null || echo "ERROR")

              if [[ "$deploy_data" != "ERROR" && -n "$deploy_data" ]]; then
                while IFS= read -r line; do
                  [[ -z "$line" ]] && continue
                  deploy_name=$(echo "$line" | awk '{print $1}')
                  desired=$(echo "$line"     | awk '{print $2}')
                  ready=$(echo "$line"       | awk '{print $3}')

                  # Skip intentionally scaled-down deployments
                  [[ "$desired" == "0" || "$desired" == "<none>" ]] && continue

                  if [[ "$ready" == "0" || "$ready" == "<none>" ]]; then
                    ns_issues+="🔴 Deployment down: $deploy_name (desired: $desired, ready: 0)\n"
                  fi
                done <<< "$deploy_data"
              fi

              if [[ -n "$ns_issues" ]]; then
                ISSUES_FOUND=true
                NS_ISSUES+="**[$ns]**\n${ns_issues}\n"
              fi
            done

            echo "Checked $NAMESPACES_CHECKED namespaces, $NAMESPACES_FAILED unreachable"

            # ── Send alert or log healthy ─────────────────────────────────────
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

            if [[ "$ISSUES_FOUND" == true ]]; then
              echo "Issues detected — sending Teams alert"

              FOOTER="To initiate failover: Azure DevOps → Pipelines → failover → Run pipeline. Select namespaces and direction (scale-up or revert)."

              send_teams_alert \
                "🚨 Cluster Health Alert" \
                "$TIMESTAMP — $NAMESPACES_CHECKED namespace(s) checked" \
                "$(printf '%b' "$NS_ISSUES")" \
                "attention" \
                "$FOOTER"

              echo "Teams alert sent"
            else
              echo "✔ All $NAMESPACES_CHECKED namespaces healthy"
            fi

            exit 0
