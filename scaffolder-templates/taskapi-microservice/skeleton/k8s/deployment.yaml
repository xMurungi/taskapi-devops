apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ values.name }}-deployment
  namespace: ${{ values.name }}
  labels:
    app: ${{ values.name }}
spec:
  replicas: ${{ values.replicas }}
  selector:
    matchLabels:
      app: ${{ values.name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ${{ values.name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "${{ values.port }}"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: ${{ values.name }}
          image: taskapidevacr.azurecr.io/${{ values.name }}:latest
          imagePullPolicy: Always
          ports:
            - containerPort: ${{ values.port }}
          envFrom:
            - configMapRef:
                name: ${{ values.name }}-config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: ${{ values.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: ${{ values.port }}
            initialDelaySeconds: 15
            periodSeconds: 20