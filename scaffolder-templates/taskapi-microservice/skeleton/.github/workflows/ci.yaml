name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest -v

  build-and-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=taskapidevacr.azurecr.io/${{ values.name }}" >> $GITHUB_ENV

      - name: Log in to ACR
        uses: azure/login@v1
        with:
          creds: ${{ "${{ secrets.AZURE_CREDENTIALS }}" }}

      - name: Authenticate Docker to ACR
        run: az acr login --name taskapidevacr

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ "${{ env.IMAGE_NAME }}" }}:${{ "${{ github.sha }}" }}
          load: true

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ "${{ env.IMAGE_NAME }}" }}:${{ "${{ github.sha }}" }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Push image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ "${{ env.IMAGE_NAME }}" }}:${{ "${{ github.sha }}" }}
            ${{ "${{ env.IMAGE_NAME }}" }}:latest

  update-manifest:
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ "${{ secrets.GITHUB_TOKEN }}" }}

      - name: Set image name
        run: echo "IMAGE_NAME=taskapidevacr.azurecr.io/${{ values.name }}" >> $GITHUB_ENV

      - name: Update image tag
        run: |
          sed -i "s|image: taskapidevacr.azurecr.io/${{ values.name }}:.*|image: ${{ "${{ env.IMAGE_NAME }}" }}:${{ "${{ github.sha }}" }}|" k8s/deployment.yaml

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git diff --staged --quiet || git commit -m "chore: update image tag to ${{ "${{ github.sha }}" }}"
          git push
