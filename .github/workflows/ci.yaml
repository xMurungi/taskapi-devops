name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  IMAGE_NAME: ghcr.io/${{github.repository_owner }}/taskapi

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -v

  build-and-scan:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write      # needed to push to GHCR
    steps:
      - uses: actions/checkout@v4
      