name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -v

  build-and-scan:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write                                               # kept for potential GHCR fallback
    steps:
      - uses: actions/checkout@v4

      - name: Set image name (lowercase)
        run: |
          echo "IMAGE_NAME=taskapidevacr.azurecr.io/taskapi" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Authenticate Docker to ACR
        run: az acr login --name taskapidevacr

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false                                               # build only, don't push yet
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          load: true                                                # load into Docker daemon for scanning

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: 1                                              # fail the pipeline on CRITICAL/HIGH CVEs
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore

      - name: Push image
        if: github.ref == 'refs/heads/main'                         # only push on main branch
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

  update-manifest:
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name          # ← add this, same as build-and-scan
        run: |
          echo "IMAGE_NAME=taskapidevacr.azurecr.io/taskapi" >> $GITHUB_ENV

      - name: Update image tag in manifest
        run: |
          sed -i "s|image: taskapidevacr.azurecr.io/taskapi:.*|image: ${{ env.IMAGE_NAME }}:${{ github.sha }}|" k8s/deployment.yaml

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git diff --staged --quiet || git commit -m "chore: update image tag to ${{ github.sha }}"
          git push
