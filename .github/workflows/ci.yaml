name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -v

  build-and-scan:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write                                               # needed to push to GHCR
    steps:
      - uses: actions/checkout@v4

      - name: Set image name (lowercase)
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=ghcr.io/${OWNER}/taskapi" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}                     # auto-provided, no setup needed
          
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false                                               # build only, don't push yet
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          load: true                                                # load into Docker daemon for scanning

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: 1                                              # fail the pipeline on CRITICAL/HIGH CVEs
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore

      - name: Push image
        if: github.ref == 'refs/heads/main'                         # only push on main branch
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
